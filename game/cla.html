<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Particle Levitation Drum</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0c; font-family: 'Courier New', monospace; color: #d0d0d0; }
  #app { position: relative; width: 100vw; height: 100vh; background: radial-gradient(ellipse at center, #1a1a1f 0%, #08080a 100%); }
  canvas { display: block; position: absolute; inset: 0; }

  .wing {
    position: absolute;
    display: flex; flex-direction: column; align-items: stretch;
    padding: 10px 8px; gap: 10px; box-sizing: border-box;
    z-index: 10;
  }

  /* Brass selector widget (left wing) */
  .sel { position: relative; width: 96px; display: flex; flex-direction: column; align-items: center; gap: 3px; pointer-events: auto; }
  .sel .sel-body {
    position: relative; width: 100%; height: 30px; border-radius: 4px; padding: 3px;
    background: linear-gradient(180deg, #d9b76a 0%, #8a6b2e 40%, #5a4418 70%, #8a6b2e 100%);
    box-shadow: inset 0 1px 0 rgba(255,230,150,0.5), inset 0 -1px 0 rgba(0,0,0,0.6), 0 2px 3px rgba(0,0,0,0.6);
    display: flex; align-items: stretch; gap: 2px;
  }
  .sel .chev {
    width: 16px; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #c9a85a 0%, #8a6b2e 70%);
    border-radius: 2px; color: #2a1a06; font-size: 11px; font-weight: bold; cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,230,150,0.5), inset 0 -1px 0 rgba(0,0,0,0.4);
    user-select: none; -webkit-user-select: none;
  }
  .sel .chev:hover { background: linear-gradient(180deg, #e0c078, #9a7a38); }
  .sel .chev:active { box-shadow: inset 0 2px 3px rgba(0,0,0,0.5); }
  .sel .win {
    flex: 1; border-radius: 2px;
    background: radial-gradient(ellipse at 50% 30%, #143018 0%, #0a1a0e 70%, #050a06 100%);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.9);
    color: #6fff8a; font-family: 'Courier New', monospace;
    font-weight: bold; font-size: 14px; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center;
    text-shadow: 0 0 4px rgba(111,255,138,0.6), 0 0 8px rgba(111,255,138,0.25);
    font-variant-numeric: tabular-nums; cursor: pointer;
    user-select: none; -webkit-user-select: none;
  }
  .sel .sel-lbl { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 1.5px; color: #d8c18a; text-transform: uppercase; text-shadow: 0 1px 0 #000; white-space: nowrap; }

  /* Brass industrial buttons (right wing) */
  .btnind {
    position: relative; width: 96px; height: 56px; padding: 0; border: none; border-radius: 6px;
    background: linear-gradient(180deg, #e8c77a 0%, #c9a858 18%, #8a6b2e 55%, #5a4418 85%, #3a2a0e 100%);
    box-shadow: inset 0 1px 0 rgba(255,235,170,0.7), inset 0 -2px 3px rgba(0,0,0,0.55), 0 3px 5px rgba(0,0,0,0.6), 0 1px 0 rgba(255,235,170,0.2);
    cursor: pointer; pointer-events: auto; user-select: none; -webkit-user-select: none; overflow: hidden; display: block;
  }
  .btnind::before, .btnind::after {
    content: ''; position: absolute; width: 4px; height: 4px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #c8c8d0 0%, #5a5a62 55%, #101014 100%);
    box-shadow: inset -1px -1px 1px rgba(0,0,0,0.7), 0 1px 1px rgba(0,0,0,0.5);
  }
  .btnind::before { top: 4px; left: 4px; }
  .btnind::after  { bottom: 4px; right: 4px; }
  .btnind .cap {
    position: absolute; left: 10px; right: 10px; top: 10px; bottom: 10px; border-radius: 4px;
    background: radial-gradient(ellipse at 50% 30%, #2a1810 0%, #180c08 70%, #080404 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.8), inset 0 2px 5px rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.05s ease-out, box-shadow 0.05s ease-out, background 0.12s ease-out;
  }
  .btnind .cap-label {
    font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase;
    color: #ffb070; text-shadow: 0 1px 0 #000, 0 0 4px rgba(255,140,60,0.35);
    transition: color 0.12s ease-out, text-shadow 0.12s ease-out;
  }
  .btnind:hover .cap { background: radial-gradient(ellipse at 50% 30%, #4a2a1a 0%, #2a140a 70%, #140604 100%); }
  .btnind:hover .cap-label { color: #ffd0a0; text-shadow: 0 1px 0 #000, 0 0 6px rgba(255,180,90,0.6); }
  .btnind:active .cap { transform: translateY(1px); box-shadow: inset 0 2px 6px rgba(0,0,0,0.9), inset 0 -1px 0 rgba(255,255,255,0.04); }
  .btnind.on .cap {
    background: radial-gradient(ellipse at 50% 35%, #c0ffd4 0%, #50e080 40%, #1a6028 85%, #082c10 100%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), inset 0 -1px 0 rgba(0,0,0,0.4), inset 0 0 10px rgba(120,255,160,0.6), 0 0 8px rgba(80,255,130,0.45);
  }
  .btnind.on .cap-label { color: #0a3018; text-shadow: 0 1px 0 rgba(255,255,255,0.4), 0 0 6px rgba(255,255,255,0.6); }
  .btnind.flash .cap {
    background: radial-gradient(ellipse at 50% 35%, #fff2bb 0%, #ffcc55 40%, #a06820 85%, #3a2208 100%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.6), inset 0 0 10px rgba(255,220,120,0.7), 0 0 10px rgba(255,204,85,0.6);
  }
  .btnind.flash .cap-label { color: #3a2208; text-shadow: 0 1px 0 rgba(255,255,255,0.5), 0 0 4px rgba(255,255,255,0.5); }

  /* Curved Ω buttons on the drum */
  .omega-ctl { position: absolute; pointer-events: none; z-index: 9; left: 0; top: 0; }
  .omega-ctl .btn { pointer-events: auto; cursor: pointer; }
  .omega-ctl.disabled .btn { pointer-events: none; cursor: default; }
  .omega-ctl.disabled .btn-label { opacity: 0; }
  .omega-ctl .btn-arrow { stroke: #2a2a32; stroke-width: 1.5; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.7)); transition: filter 0.1s; }
  #btnOmegaPlus  .btn-arrow { fill: url(#gradGreen); }
  #btnOmegaMinus .btn-arrow { fill: url(#gradRed); }
  #btnOmegaPlus:hover  .btn-arrow { fill: url(#gradGreenHover); }
  #btnOmegaMinus:hover .btn-arrow { fill: url(#gradRedHover); }
  .omega-ctl .btn:active .btn-arrow { filter: drop-shadow(0 1px 1px rgba(0,0,0,0.7)); }
  .omega-ctl .btn-label { fill: #ffffff; font-family: 'Courier New', monospace; font-weight: bold; font-size: 22px; pointer-events: none; paint-order: stroke; stroke: #000; stroke-width: 4; }

  /* Bottom gauge overlay */
  .gauges { position: absolute; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 0 20px; box-sizing: border-box; z-index: 10; pointer-events: none; }
  .gauge { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 78px; }
  .disp {
    position: relative; width: 78px; height: 36px; border-radius: 4px; padding: 3px;
    background: linear-gradient(180deg, #d9b76a 0%, #8a6b2e 40%, #5a4418 70%, #8a6b2e 100%);
    box-shadow: inset 0 1px 0 rgba(255,230,150,0.5), inset 0 -1px 0 rgba(0,0,0,0.6), 0 2px 3px rgba(0,0,0,0.6);
  }
  .scr {
    width: 100%; height: 100%; border-radius: 2px;
    background: radial-gradient(ellipse at 50% 30%, #143018 0%, #0a1a0e 70%, #050a06 100%);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.9);
    color: #6fff8a; font-family: 'Courier New', monospace;
    font-weight: bold; font-size: 16px; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center;
    text-shadow: 0 0 4px rgba(111,255,138,0.6), 0 0 10px rgba(111,255,138,0.25);
    font-variant-numeric: tabular-nums;
  }
  .scr.warn { color: #ff7a5a; text-shadow: 0 0 4px rgba(255,122,90,0.7); background: radial-gradient(ellipse at 50% 30%, #30140a 0%, #1a0a06 70%, #0a0302 100%); }
  .scr.rot  { color: #5ad0ff; text-shadow: 0 0 4px rgba(90,208,255,0.6); background: radial-gradient(ellipse at 50% 30%, #0a2034 0%, #061020 70%, #02060a 100%); }
  .scr.gold { color: #ffcc55; text-shadow: 0 0 4px rgba(255,204,85,0.6); background: radial-gradient(ellipse at 50% 30%, #2a1c06 0%, #1a1204 70%, #0a0602 100%); }
  .lbl { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 1.5px; color: #d8c18a; text-transform: uppercase; text-shadow: 0 1px 0 #000; white-space: nowrap; }
  .title-plate {
    padding: 5px 10px; background: linear-gradient(180deg, #d9b76a, #8a6b2e);
    border: 1px solid #5a4418; border-radius: 3px;
    font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold; letter-spacing: 2px;
    color: #2a1a06; text-shadow: 0 1px 0 rgba(255,255,255,0.3);
    box-shadow: inset 0 1px 0 rgba(255,230,150,0.5), 0 1px 2px rgba(0,0,0,0.6);
    margin-right: 6px;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>
  <svg id="omegaCtl" class="omega-ctl" xmlns="http://www.w3.org/2000/svg"></svg>

  <div class="wing" id="wingLeft">
    <div class="sel" data-key="NP">
      <div class="sel-body"><div class="chev" data-dir="-1">◀</div><div class="win" id="winNP">3</div><div class="chev" data-dir="+1">▶</div></div>
      <div class="sel-lbl">Particles</div>
    </div>
    <div class="sel" data-key="VT">
      <div class="sel-body"><div class="chev" data-dir="-1">◀</div><div class="win" id="winVT">30</div><div class="chev" data-dir="+1">▶</div></div>
      <div class="sel-lbl">v_t cm/s</div>
    </div>
    <div class="sel" data-key="SPREAD">
      <div class="sel-body"><div class="chev" data-dir="-1">◀</div><div class="win" id="winSpread">0%</div><div class="chev" data-dir="+1">▶</div></div>
      <div class="sel-lbl">v_t spread</div>
    </div>
    <div class="sel" data-key="DT">
      <div class="sel-body"><div class="chev" data-dir="-1">◀</div><div class="win" id="winDT">1 s</div><div class="chev" data-dir="+1">▶</div></div>
      <div class="sel-lbl">Δt inject</div>
    </div>
  </div>

  <div class="wing" id="wingRight">
    <button class="btnind" id="btnStart"><span class="cap"><span class="cap-label">Release</span></span></button>
    <button class="btnind" id="btnReset"><span class="cap"><span class="cap-label">Reset</span></span></button>
    <button class="btnind" id="btnLaser"><span class="cap"><span class="cap-label">Laser</span></span></button>
    <button class="btnind" id="btnOmegaCtl"><span class="cap"><span class="cap-label">Ω Ctrl</span></span></button>
    <button class="btnind" id="btnSound"><span class="cap"><span class="cap-label">Sound</span></span></button>
  </div>

  <div class="gauges" id="gauges">
    <div class="title-plate">LEVITATION&nbsp;LAB&nbsp;· LV.1</div>
    <div class="gauge"><div class="disp"><div class="scr rot" id="period">∞</div></div><div class="lbl">Period s</div></div>
    <div class="gauge"><div class="disp"><div class="scr warn" id="captured">0</div></div><div class="lbl">Lost</div></div>
    <div class="gauge"><div class="disp"><div class="scr gold" id="floating">0</div></div><div class="lbl">Floating</div></div>
    <div class="gauge"><div class="disp"><div class="scr" id="remaining">0</div></div><div class="lbl">Levitated</div></div>
    <div class="gauge"><div class="disp"><div class="scr gold" id="vt">30.0</div></div><div class="lbl">v_t cm/s</div></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const CFG = {
    R_DRUM: 100, R_AXIS: 5, DEPTH: 20, PARTICLE_R: 0.5,
    N_P: 3, V_T: 30, DT_INJECT: 1.0,
    VT_SPREAD: 0,
    RELEASE_Y: 100, RELEASE_X_MIN: 0, RELEASE_X_MAX: 100,
    BRAKE_DAMP: 1.2, SLIP_RATE: 2.8,
    MAX_DT: 0.033,
  };

  const LASER_OMEGA = 2 * Math.PI / 1.2;

  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let W = 800, H = 600, DPR = 1;
  let CX = 400, CY = 300, SCALE = 2;

  const GEO = {
    barTop: 0, barBot: 0, barHalfW: 0,
    footTopY: 0, footBotY: 0, footTopHalfW: 0, footBotHalfW: 0,
    wingW: 120, wingTop: 60, wingBot: 0, wingLeftX: 20, wingRightX: 0,
  };

  function layout() {
    DPR = Math.max(1, window.devicePixelRatio || 1);
    W = Math.max(200, window.innerWidth);
    H = Math.max(200, window.innerHeight);
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const BAND_OUTSIDE = 32;
    const TOP_MARGIN   = 90;   // generous room for the injector manifold + supply pipe
    const BOT_MARGIN   = 30;
    const FOOT_HEIGHT  = 70;
    const BAR_HEIGHT   = 96;
    const WING_WIDTH   = 120;
    const WING_GAP     = 40;
    const ARROW_ROOM   = 84;
    const SIDE_RESERVE = WING_WIDTH + WING_GAP + ARROW_ROOM;

    const vBudget = Math.max(140, H - TOP_MARGIN - BOT_MARGIN - FOOT_HEIGHT - BAR_HEIGHT);
    const hBudget = Math.max(140, W - 2 * SIDE_RESERVE);
    const outerDia = Math.min(hBudget, vBudget);
    const rDrumPx = Math.max(40, outerDia * 0.5 - BAND_OUTSIDE);
    SCALE = Math.max(0.2, rDrumPx / CFG.R_DRUM);

    CX = W * 0.5;
    const dPx = CFG.R_DRUM * SCALE;
    CY = TOP_MARGIN + BAND_OUTSIDE + dPx;
    const bandBot = CY + dPx + BAND_OUTSIDE;
    const barTop = bandBot + FOOT_HEIGHT;
    const barBot = barTop + BAR_HEIGHT;
    const halfW = Math.min(W * 0.44, Math.max(dPx * 1.3, (dPx + BAND_OUTSIDE) * 1.15));

    GEO.barTop = barTop;
    GEO.barBot = barBot;
    GEO.barHalfW = halfW;
    GEO.footTopY = bandBot - 2;
    GEO.footBotY = barTop + 2;
    GEO.footTopHalfW = (dPx + BAND_OUTSIDE) * Math.sin(28 * Math.PI / 180);
    GEO.footBotHalfW = halfW * 0.92;
    GEO.wingW = WING_WIDTH;
    GEO.wingTop = TOP_MARGIN;
    GEO.wingBot = barBot;
    GEO.wingLeftX = 20;
    GEO.wingRightX = W - 20 - WING_WIDTH;

    const g = document.getElementById('gauges');
    if (g) {
      g.style.left = (CX - halfW) + 'px'; g.style.top = barTop + 'px';
      g.style.width = (2 * halfW) + 'px'; g.style.height = BAR_HEIGHT + 'px';
    }
    const wL = document.getElementById('wingLeft');
    const wR = document.getElementById('wingRight');
    if (wL) {
      wL.style.left = GEO.wingLeftX + 'px'; wL.style.top = GEO.wingTop + 'px';
      wL.style.width = WING_WIDTH + 'px'; wL.style.height = (GEO.wingBot - GEO.wingTop) + 'px';
    }
    if (wR) {
      wR.style.left = GEO.wingRightX + 'px'; wR.style.top = GEO.wingTop + 'px';
      wR.style.width = WING_WIDTH + 'px'; wR.style.height = (GEO.wingBot - GEO.wingTop) + 'px';
    }
    buildOmegaControls();
  }

  const state = {
    running: false, particles: [], toInject: [],
    t: 0, omega: 0, omegaTarget: 0, drumAngle: 0,
    laserAngle: 0, laserOn: false,
    pointers: new Map(), holding: false,
  };

  function initLevel() {
    state.running = false;
    state.particles = [];
    state.toInject = [];
    state.t = 0;
    state.omega = 0;
    state.omegaTarget = 0;
    state.drumAngle = 0;
    updateHUD();
  }

  function randn() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  function scheduleInjections() {
    state.toInject = [];
    const N = CFG.N_P;
    for (let i = 0; i < N; i++) {
      const t = (N === 1 || CFG.DT_INJECT === 0) ? 0 : (i / (N - 1)) * CFG.DT_INJECT;
      const x = CFG.RELEASE_X_MIN + Math.random() * (CFG.RELEASE_X_MAX - CFG.RELEASE_X_MIN);
      let vt = CFG.V_T;
      if (CFG.VT_SPREAD > 0) {
        vt = CFG.V_T * (1 + CFG.VT_SPREAD * randn());
        if (vt < 0.1) vt = 0.1;
      }
      state.toInject.push({ t, x, vt });
    }
    state.toInject.sort((a, b) => a.t - b.t);
  }

  function startRelease() {
    const savedOmega = state.omega;
    const savedTarget = state.omegaTarget;
    const savedAngle = state.drumAngle;
    initLevel();
    state.omega = savedOmega;
    state.omegaTarget = savedTarget;
    state.drumAngle = savedAngle;
    scheduleInjections();
    state.running = true;
  }

  function updateDrum(dt) {
    if (state.holding) {
      state.omegaTarget *= Math.exp(-CFG.BRAKE_DAMP * dt);
      state.omega *= Math.exp(-CFG.BRAKE_DAMP * dt);
    } else {
      const a = 1 - Math.exp(-CFG.SLIP_RATE * dt);
      state.omega += (state.omegaTarget - state.omega) * a;
    }
    if (Math.abs(state.omega) < 1e-4 && Math.abs(state.omegaTarget) < 1e-4) {
      state.omega = 0; state.omegaTarget = 0;
    }
    state.drumAngle += state.omega * dt;
    state.laserAngle += LASER_OMEGA * dt;
  }

  function step(dt) {
    while (state.toInject.length && state.toInject[0].t <= state.t) {
      const inj = state.toInject.shift();
      state.particles.push({
        x: inj.x, y: CFG.RELEASE_Y,
        vx: 0, vy: 0, stuck: false, stuckAngle: 0, alive: true,
        inHighlightSince: null, flashEndsAt: -1, insideOnce: false,
        vt: inj.vt, trail: [], trailTick: 0,
      });
    }
    const omega = state.omega;
    const HX = 50, HY = 0, HR2 = 50 * 50;
    const laser1 = state.laserAngle;
    const laser0 = laser1 - LASER_OMEGA * dt;

    for (const p of state.particles) {
      if (!p.alive) continue;
      if (p.stuck) {
        p.stuckAngle += omega * dt;
        p.x = CFG.R_DRUM * Math.cos(p.stuckAngle);
        p.y = CFG.R_DRUM * Math.sin(p.stuckAngle);
        p.inHighlightSince = null;
      } else {
        const vxg = -omega * p.y;
        const vyg =  omega * p.x;
        p.vx = vxg;
        p.vy = vyg - p.vt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;

        const r2 = p.x * p.x + p.y * p.y;
        const Rwall = CFG.R_DRUM - CFG.PARTICLE_R;
        const R_ENTRY = CFG.R_DRUM * 0.90;
        if (!p.insideOnce && r2 < R_ENTRY * R_ENTRY) p.insideOnce = true;

        if (p.insideOnce && r2 >= Rwall * Rwall) {
          const ang = Math.atan2(p.y, p.x);
          p.stuck = true;
          p.stuckAngle = ang;
          p.x = Rwall * Math.cos(ang);
          p.y = Rwall * Math.sin(ang);
          p.inHighlightSince = null;
          soundTink();
        } else if (p.insideOnce) {
          const dxh = p.x - HX, dyh = p.y - HY;
          const inside = (dxh * dxh + dyh * dyh) <= HR2;
          if (inside) {
            if (p.inHighlightSince === null) p.inHighlightSince = state.t;
          } else {
            p.inHighlightSince = null;
          }
        }

        if (p.y < -CFG.R_DRUM * 1.5) p.alive = false;
      }

      if (state.laserOn && !p.stuck && p.insideOnce) {
        const pa = Math.atan2(p.y, p.x);
        if (angleSwept(laser0, laser1, pa)) p.flashEndsAt = state.t + 0.40;
      }

      if (!p.stuck && p.insideOnce) {
        p.trailTick = (p.trailTick + 1) | 0;
        if (p.trailTick >= 3) {
          p.trailTick = 0;
          p.trail.push({ x: p.x, y: p.y });
          if (p.trail.length > 12) p.trail.shift();
        }
      } else if (p.stuck) {
        if (p.trail.length) p.trail.length = 0;
      }
    }
    state.t += dt;
  }

  function angleSwept(a0, a1, t) {
    let d = a1 - a0;
    if (d === 0) return false;
    if (Math.abs(d) >= 2 * Math.PI) return true;
    const TAU = 2 * Math.PI;
    const norm = (x) => { let r = x % TAU; if (r > Math.PI) r -= TAU; if (r <= -Math.PI) r += TAU; return r; };
    const dN = norm(d);
    const tN = norm(t - a0);
    if (dN > 0) return tN >= 0 && tN <= dN;
    else        return tN <= 0 && tN >= dN;
  }

  function X2px(x) { return CX + x * SCALE; }
  function Y2px(y) { return CY - y * SCALE; }
  function pxDist(cm) { return cm * SCALE; }

  function rivet(x, y, r) {
    const rr = Math.max(0.5, r);
    const g = ctx.createRadialGradient(x - rr * 0.4, y - rr * 0.4, 0, x, y, rr);
    g.addColorStop(0, '#9a9aa2');
    g.addColorStop(0.6, '#3a3a44');
    g.addColorStop(1, '#101014');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, rr, 0, Math.PI * 2); ctx.fill();
  }

  function drawLabBackground() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    const gs = 40;
    for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    ctx.fillStyle = '#1c1c22';
    ctx.fillRect(0, 0, 50, H);
    ctx.fillRect(W - 50, 0, 50, H);
    for (let y = 30; y < H; y += 40) {
      rivet(15, y, 3);
      rivet(W - 15, y, 3);
    }
    ctx.restore();
  }

  function drawWing(x, y, w, h) {
    if (w <= 0 || h <= 0) return;
    const g = ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0.00, '#1a1a22');
    g.addColorStop(0.05, '#3a3a42');
    g.addColorStop(0.20, '#4a4a52');
    g.addColorStop(0.50, '#2e2e34');
    g.addColorStop(0.85, '#1a1a22');
    g.addColorStop(1.00, '#0e0e14');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y + 0.5); ctx.lineTo(x + w, y + 0.5); ctx.stroke();
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, y + h - 0.5); ctx.lineTo(x + w, y + h - 0.5); ctx.stroke();
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    for (let yy = y + 2; yy < y + h - 2; yy += 2) { ctx.beginPath(); ctx.moveTo(x + 2, yy); ctx.lineTo(x + w - 2, yy); ctx.stroke(); }
    ctx.restore();
    rivet(x + 8, y + 10, 3);
    rivet(x + w - 8, y + 10, 3);
    rivet(x + 8, y + h - 10, 3);
    rivet(x + w - 8, y + h - 10, 3);
    const midCount = Math.max(1, Math.floor((h - 40) / 70));
    for (let i = 1; i <= midCount; i++) {
      const yy = y + 10 + i * ((h - 20) / (midCount + 1));
      rivet(x + 8, yy, 3);
      rivet(x + w - 8, yy, 3);
    }
  }

  function drawInjector() {
    // Brass manifold at y = RELEASE_Y cm, spanning x in [RELEASE_X_MIN..MAX]
    // with a slight overhang, supply pipe going up, and nozzles pointing down.
    const yBar = Y2px(CFG.RELEASE_Y);
    const x0 = X2px(CFG.RELEASE_X_MIN - 6);
    const x1 = X2px(CFG.RELEASE_X_MAX + 6);
    if (!isFinite(yBar) || !isFinite(x0) || !isFinite(x1) || x1 <= x0) return;

    const barH = Math.max(8, pxDist(6));
    const yTop = yBar - barH;
    const yBot = yBar;
    if (yBot < 0) return;

    // Supply pipe from left end of manifold up to the top of the viewport.
    const capW = Math.max(4, pxDist(3));
    const pipeX = x0 + capW * 1.6;
    const pipeW = Math.max(4, pxDist(3));
    if (yTop > 0) {
      const pg = ctx.createLinearGradient(pipeX - pipeW/2, 0, pipeX + pipeW/2, 0);
      pg.addColorStop(0, '#8a6b2e');
      pg.addColorStop(0.4, '#d9b76a');
      pg.addColorStop(0.7, '#8a6b2e');
      pg.addColorStop(1, '#5a4418');
      ctx.fillStyle = pg;
      ctx.fillRect(pipeX - pipeW / 2, 0, pipeW, yTop);
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pipeX - pipeW / 2 + 0.5, 0); ctx.lineTo(pipeX - pipeW / 2 + 0.5, yTop);
      ctx.moveTo(pipeX + pipeW / 2 - 0.5, 0); ctx.lineTo(pipeX + pipeW / 2 - 0.5, yTop);
      ctx.stroke();
      // Collar where pipe meets the manifold
      ctx.fillStyle = '#5a4418';
      ctx.fillRect(pipeX - pipeW * 0.75, yTop - 2, pipeW * 1.5, 3);
    }

    // Manifold bar body
    const gBrass = ctx.createLinearGradient(0, yTop, 0, yBot);
    gBrass.addColorStop(0.00, '#e8c77a');
    gBrass.addColorStop(0.20, '#d9b76a');
    gBrass.addColorStop(0.55, '#8a6b2e');
    gBrass.addColorStop(1.00, '#5a4418');
    ctx.fillStyle = gBrass;
    ctx.fillRect(x0, yTop, x1 - x0, yBot - yTop);

    // Top highlight + bottom shadow
    ctx.strokeStyle = 'rgba(255,235,170,0.7)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x0, yTop + 0.5); ctx.lineTo(x1, yTop + 0.5); ctx.stroke();
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x0, yBot - 0.5); ctx.lineTo(x1, yBot - 0.5); ctx.stroke();

    // End bevels
    const capA = ctx.createLinearGradient(x0, 0, x0 + capW, 0);
    capA.addColorStop(0, 'rgba(0,0,0,0.45)'); capA.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = capA; ctx.fillRect(x0, yTop, capW, yBot - yTop);
    const capB = ctx.createLinearGradient(x1 - capW, 0, x1, 0);
    capB.addColorStop(0, 'rgba(0,0,0,0)'); capB.addColorStop(1, 'rgba(0,0,0,0.45)');
    ctx.fillStyle = capB; ctx.fillRect(x1 - capW, yTop, capW, yBot - yTop);

    // Steel rivets on the caps
    rivet(x0 + capW * 0.5, yTop + barH * 0.5, Math.max(2, barH * 0.22));
    rivet(x1 - capW * 0.5, yTop + barH * 0.5, Math.max(2, barH * 0.22));

    // Downward nozzles
    const nozzleCount = 6;
    const nozzleAreaX0 = X2px(CFG.RELEASE_X_MIN + 5);
    const nozzleAreaX1 = X2px(CFG.RELEASE_X_MAX - 5);
    const nozzleH = Math.max(3, pxDist(2));
    const nozzleHalfW = Math.max(2, pxDist(1.8));
    for (let i = 0; i < nozzleCount; i++) {
      const cx = nozzleAreaX0 + (i + 0.5) * (nozzleAreaX1 - nozzleAreaX0) / nozzleCount;
      const tipHalfW = nozzleHalfW * 0.6;
      const nGrad = ctx.createLinearGradient(0, yBot, 0, yBot + nozzleH);
      nGrad.addColorStop(0, '#8a6b2e');
      nGrad.addColorStop(0.6, '#5a4418');
      nGrad.addColorStop(1, '#2a1a06');
      ctx.fillStyle = nGrad;
      ctx.beginPath();
      ctx.moveTo(cx - nozzleHalfW, yBot);
      ctx.lineTo(cx + nozzleHalfW, yBot);
      ctx.lineTo(cx + tipHalfW, yBot + nozzleH);
      ctx.lineTo(cx - tipHalfW, yBot + nozzleH);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#050306';
      ctx.beginPath();
      ctx.ellipse(cx, yBot + nozzleH - 1, tipHalfW * 0.7, Math.max(0.8, nozzleH * 0.18), 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,235,170,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - nozzleHalfW + 0.5, yBot);
      ctx.lineTo(cx - tipHalfW + 0.5, yBot + nozzleH);
      ctx.stroke();
    }
  }

  function drawOmegaFeet() {
    const yTop = GEO.footTopY, yBot = GEO.footBotY;
    if (!isFinite(yTop) || !isFinite(yBot) || yBot <= yTop) return;
    const xTopInner = GEO.footTopHalfW * 0.55;
    const xTopOuter = GEO.footTopHalfW;
    const xBotInner = GEO.footBotHalfW * 0.55;
    const xBotOuter = GEO.footBotHalfW;
    const sg = ctx.createLinearGradient(0, yTop, 0, yBot);
    sg.addColorStop(0.00, '#6a6a72');
    sg.addColorStop(0.25, '#4a4a52');
    sg.addColorStop(0.55, '#2a2a32');
    sg.addColorStop(1.00, '#1a1a22');
    for (const sign of [-1, +1]) {
      ctx.beginPath();
      ctx.moveTo(CX + sign * xTopInner, yTop);
      ctx.lineTo(CX + sign * xTopOuter, yTop);
      ctx.lineTo(CX + sign * xBotOuter, yBot);
      ctx.lineTo(CX + sign * xBotInner, yBot);
      ctx.closePath();
      ctx.fillStyle = sg; ctx.fill();
      ctx.strokeStyle = 'rgba(210,210,220,0.35)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(CX + sign * xTopOuter, yTop); ctx.lineTo(CX + sign * xBotOuter, yBot); ctx.stroke();
      ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(CX + sign * xTopInner, yTop); ctx.lineTo(CX + sign * xBotInner, yBot); ctx.stroke();
      const midTop = (xTopInner + xTopOuter) * 0.5;
      const midBot = (xBotInner + xBotOuter) * 0.5;
      rivet(CX + sign * midTop, yTop + 6, 3.5);
      rivet(CX + sign * midBot, yBot - 8, 3.5);
    }
  }

  function drawOmegaBar() {
    const x0 = CX - GEO.barHalfW, x1 = CX + GEO.barHalfW;
    const y0 = GEO.barTop, y1 = GEO.barBot;
    if (!isFinite(x0) || !isFinite(x1) || !isFinite(y0) || !isFinite(y1) || y1 <= y0 || x1 <= x0) return;
    const g = ctx.createLinearGradient(0, y0, 0, y1);
    g.addColorStop(0.00, '#6a6a72');
    g.addColorStop(0.05, '#8a8a92');
    g.addColorStop(0.20, '#4a4a52');
    g.addColorStop(0.55, '#2e2e34');
    g.addColorStop(0.85, '#1a1a22');
    g.addColorStop(1.00, '#0e0e14');
    ctx.fillStyle = g; ctx.fillRect(x0, y0, x1 - x0, y1 - y0);
    ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x0, y0 + 0.5); ctx.lineTo(x1, y0 + 0.5); ctx.stroke();
    ctx.strokeStyle = 'rgba(0,0,0,0.9)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x0, y1 - 0.5); ctx.lineTo(x1, y1 - 0.5); ctx.stroke();
    ctx.save();
    ctx.globalAlpha = 0.08; ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    for (let x = x0; x < x1; x += 2) { ctx.beginPath(); ctx.moveTo(x, y0 + 2); ctx.lineTo(x, y1 - 2); ctx.stroke(); }
    ctx.restore();
    for (let x = x0 + 14; x < x1 - 10; x += 28) { rivet(x, y0 + 8, 3); rivet(x, y1 - 8, 3); }
    const capW = 6;
    const capA = ctx.createLinearGradient(x0, 0, x0 + capW, 0);
    capA.addColorStop(0, 'rgba(0,0,0,0.55)'); capA.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = capA; ctx.fillRect(x0, y0, capW, y1 - y0);
    const capB = ctx.createLinearGradient(x1 - capW, 0, x1, 0);
    capB.addColorStop(0, 'rgba(0,0,0,0)'); capB.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = capB; ctx.fillRect(x1 - capW, y0, capW, y1 - y0);
  }

  function drawSteelBand() {
    const rInner = Math.max(1, pxDist(CFG.R_DRUM));
    const rOuter = rInner + 32;
    drawOmegaFeet();
    const g = ctx.createRadialGradient(CX, CY, rInner, CX, CY, rOuter);
    g.addColorStop(0, '#6a6a72');
    g.addColorStop(0.4, '#3a3a42');
    g.addColorStop(0.7, '#55555c');
    g.addColorStop(1, '#202028');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(CX, CY, rOuter, 0, Math.PI * 2);
    ctx.arc(CX, CY, rInner, 0, Math.PI * 2, true);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(CX, CY, rInner, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = 'rgba(200,200,210,0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(CX, CY, rOuter - 1, 0, Math.PI * 2); ctx.stroke();
  }

  function drawBoltRing() {
    const r = pxDist(CFG.R_DRUM) + 16;
    const N = 24;
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2 - state.drumAngle;
      rivet(CX + r * Math.cos(a), CY + r * Math.sin(a), 4);
    }
  }

  function drawBackplate() {
    const r = Math.max(1, pxDist(CFG.R_DRUM));
    const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, r);
    g.addColorStop(0, '#0e0e14');
    g.addColorStop(0.7, '#080810');
    g.addColorStop(1, '#030306');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI * 2); ctx.fill();
    const hx = X2px(50), hy = Y2px(0), hr = Math.max(1, pxDist(50));
    ctx.save();
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI * 2); ctx.clip();
    ctx.fillStyle = '#22222a';
    ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawGasFlow() {
    const absOm = Math.abs(state.omega);
    if (absOm < 0.02) return;
    const r = pxDist(CFG.R_DRUM);
    const baseAlpha = Math.min(0.5, 0.25 + absOm * 0.1);
    ctx.save();
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI * 2); ctx.clip();
    ctx.translate(CX, CY); ctx.rotate(-state.drumAngle);
    const rings = [0.30, 0.48, 0.64, 0.78, 0.90];
    for (const f of rings) {
      const rr = r * f;
      ctx.strokeStyle = `rgba(140, 200, 255, ${baseAlpha * (0.9 - f * 0.3)})`;
      ctx.lineWidth = 1.5;
      const dashLen = Math.max(6, rr * 0.15);
      const gapLen  = Math.max(10, rr * 0.35);
      ctx.setLineDash([dashLen, gapLen]);
      ctx.lineDashOffset = f * 37;
      ctx.beginPath(); ctx.arc(0, 0, rr, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawDrumInterior() {
    const r = pxDist(CFG.R_DRUM);
    ctx.save();
    ctx.translate(CX, CY); ctx.rotate(-state.drumAngle);
    ctx.strokeStyle = 'rgba(80,80,100,0.18)'; ctx.lineWidth = 1;
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * pxDist(8), Math.sin(a) * pxDist(8));
      ctx.lineTo(Math.cos(a) * r * 0.98, Math.sin(a) * r * 0.98);
      ctx.stroke();
    }
    ctx.restore();

    if (state.laserOn) {
      ctx.save();
      ctx.translate(CX, CY); ctx.rotate(-state.laserAngle);
      const fanHalfAngle = 0.025;
      const innerR = pxDist(8);
      const outerR = r * 0.99;
      ctx.beginPath();
      ctx.moveTo(Math.cos(-fanHalfAngle) * innerR, Math.sin(-fanHalfAngle) * innerR);
      ctx.arc(0, 0, outerR, -fanHalfAngle, fanHalfAngle, false);
      ctx.lineTo(Math.cos(fanHalfAngle) * innerR, Math.sin(fanHalfAngle) * innerR);
      ctx.arc(0, 0, innerR, fanHalfAngle, -fanHalfAngle, true);
      ctx.closePath();
      const grad = ctx.createLinearGradient(innerR, 0, outerR, 0);
      grad.addColorStop(0.0, 'rgba(60, 255, 120, 0.0)');
      grad.addColorStop(0.1, 'rgba(60, 255, 120, 0.18)');
      grad.addColorStop(0.7, 'rgba(60, 255, 120, 0.10)');
      grad.addColorStop(1.0, 'rgba(60, 255, 120, 0.0)');
      ctx.fillStyle = grad; ctx.fill();
      ctx.shadowColor = 'rgba(60, 255, 120, 0.9)'; ctx.shadowBlur = 8;
      ctx.strokeStyle = 'rgba(150, 255, 180, 0.95)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(innerR, 0); ctx.lineTo(outerR, 0); ctx.stroke();
      ctx.shadowBlur = 10; ctx.fillStyle = 'rgba(180, 255, 200, 1)';
      ctx.beginPath(); ctx.arc(innerR + 2, 0, 2, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }

  function drawAxis() {
    const r = Math.max(3, pxDist(CFG.R_AXIS));
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.arc(CX, CY + 2, r + 4, 0, Math.PI * 2); ctx.fill();
    const g = ctx.createRadialGradient(CX - r * 0.4, CY - r * 0.4, 0, CX, CY, r);
    g.addColorStop(0, '#b8b8c0');
    g.addColorStop(0.5, '#6a6a72');
    g.addColorStop(1, '#2a2a32');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI * 2); ctx.fill();
    ctx.save();
    ctx.translate(CX, CY); ctx.rotate(-state.drumAngle);
    ctx.strokeStyle = 'rgba(20,20,26,0.9)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-r * 0.7, 0); ctx.lineTo(r * 0.7, 0);
    ctx.moveTo(0, -r * 0.7); ctx.lineTo(0, r * 0.7);
    ctx.stroke();
    ctx.restore();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - state.drumAngle;
      rivet(CX + Math.cos(a) * r * 0.65, CY + Math.sin(a) * r * 0.65, 2);
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI * 2); ctx.stroke();
  }

  function drawOneParticle(p) {
    const x = X2px(p.x), y = Y2px(p.y);
    const rpx = Math.max(2, pxDist(CFG.PARTICLE_R) * 2);

    const FLASH_DUR = 0.40;
    let flash = 0;
    if (state.t < p.flashEndsAt) {
      flash = (p.flashEndsAt - state.t) / FLASH_DUR;
      if (flash > 1) flash = 1; if (flash < 0) flash = 0;
    }
    const absOm = Math.abs(state.omega);
    const T = absOm < 1e-3 ? Infinity : (2 * Math.PI / absOm);
    const levitated = !p.stuck && isFinite(T) && p.inHighlightSince !== null && (state.t - p.inHighlightSince) >= T;

    if (!p.stuck && p.trail && p.trail.length > 1) {
      const n = p.trail.length;
      let tR, tG, tB;
      if (levitated) { tR = 80; tG = 255; tB = 130; } else { tR = 255; tG = 220; tB = 80; }
      for (let i = 0; i < n - 1; i++) {
        const a = p.trail[i], b = p.trail[i + 1];
        const frac = (i + 1) / n;
        ctx.strokeStyle = `rgba(${tR},${tG},${tB},${0.35 * frac})`;
        ctx.lineWidth = Math.max(0.5, rpx * 0.6 * frac);
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(X2px(a.x), Y2px(a.y)); ctx.lineTo(X2px(b.x), Y2px(b.y)); ctx.stroke();
      }
      const last = p.trail[n - 1];
      ctx.strokeStyle = `rgba(${tR},${tG},${tB},0.45)`;
      ctx.lineWidth = Math.max(0.5, rpx * 0.7);
      ctx.beginPath(); ctx.moveTo(X2px(last.x), Y2px(last.y)); ctx.lineTo(x, y); ctx.stroke();
    }

    let coreColor, glowColor;
    if (p.stuck) {
      coreColor = flash > 0 ? mixHex('#ff4040', '#e6ffea', flash) : '#ff4040';
      glowColor = flash > 0
        ? `rgba(${rgbLerp(0xff, 0x60, flash)}, ${rgbLerp(0x40, 0xff, flash)}, ${rgbLerp(0x40, 0x90, flash)}, ${0.35 + 0.55 * flash})`
        : 'rgba(255,64,64,0.35)';
    } else if (levitated) {
      coreColor = flash > 0 ? mixHex('#40ff70', '#e6ffea', flash) : '#40ff70';
      glowColor = flash > 0
        ? `rgba(${rgbLerp(0x60, 0xb0, flash)}, 255, ${rgbLerp(0x80, 0xd0, flash)}, ${0.55 + 0.35 * flash})`
        : 'rgba(80, 255, 130, 0.55)';
    } else {
      coreColor = flash > 0 ? mixHex('#ffee33', '#e6ffea', flash) : '#ffee33';
      glowColor = flash > 0
        ? `rgba(${rgbLerp(0xff, 0x60, flash)}, ${rgbLerp(0xee, 0xff, flash)}, ${rgbLerp(0x33, 0x90, flash)}, ${0.45 + 0.55 * flash})`
        : 'rgba(255,238,51,0.45)';
    }
    const glowR = Math.max(rpx + 1, rpx * (3 + flash * 3.5));
    const g = ctx.createRadialGradient(x, y, 0, x, y, glowR);
    g.addColorStop(0, glowColor);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI * 2); ctx.fill();

    if (flash > 0) {
      const hr = rpx * (2.2 + flash * 2.5);
      const hg = ctx.createRadialGradient(x, y, 0, x, y, hr);
      hg.addColorStop(0, `rgba(180, 255, 210, ${0.5 * flash})`);
      hg.addColorStop(0.6, `rgba(80, 255, 130, ${0.25 * flash})`);
      hg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(x, y, hr, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = coreColor;
    ctx.beginPath(); ctx.arc(x, y, rpx * (1 + flash * 0.3), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,' + (0.7 + flash * 0.3) + ')';
    ctx.beginPath(); ctx.arc(x - rpx * 0.3, y - rpx * 0.3, rpx * 0.35, 0, Math.PI * 2); ctx.fill();
  }

  function drawParticles() {
    const rInnerPx = pxDist(CFG.R_DRUM) + 2;
    const R_DRUM_CM = CFG.R_DRUM;
    const R_BAND_OUT_CM = CFG.R_DRUM + 30 / SCALE;
    ctx.save();
    ctx.beginPath(); ctx.arc(CX, CY, rInnerPx, 0, Math.PI * 2); ctx.clip();
    for (const p of state.particles) {
      if (!p.alive) continue;
      if (Math.hypot(p.x, p.y) > R_DRUM_CM + 0.5) continue;
      drawOneParticle(p);
    }
    ctx.restore();
    for (const p of state.particles) {
      if (!p.alive) continue;
      if (Math.hypot(p.x, p.y) <= R_BAND_OUT_CM) continue;
      drawOneParticle(p);
    }
  }

  function drawGlare() {
    const r = pxDist(CFG.R_DRUM);
    const g = ctx.createLinearGradient(CX - r, CY - r, CX + r, CY + r);
    g.addColorStop(0, 'rgba(255,255,255,0.05)');
    g.addColorStop(0.3, 'rgba(255,255,255,0)');
    g.addColorStop(0.55, 'rgba(255,255,255,0.03)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.save();
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI * 2); ctx.clip();
    ctx.fillStyle = g;
    ctx.fillRect(CX - r, CY - r, r * 2, r * 2);
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawLabBackground();
    drawWing(GEO.wingLeftX, GEO.wingTop, GEO.wingW, GEO.wingBot - GEO.wingTop);
    drawWing(GEO.wingRightX, GEO.wingTop, GEO.wingW, GEO.wingBot - GEO.wingTop);
    drawInjector();
    drawSteelBand();
    drawOmegaBar();
    drawBackplate();
    drawGasFlow();
    drawDrumInterior();
    drawAxis();
    drawParticles();
    drawGlare();
    drawBoltRing();
  }

  function rgbLerp(a, b, t) { return Math.round(a + (b - a) * t); }
  function mixHex(h1, h2, t) {
    const c1 = parseInt(h1.slice(1), 16), c2 = parseInt(h2.slice(1), 16);
    const r = rgbLerp((c1>>16)&0xff, (c2>>16)&0xff, t);
    const g = rgbLerp((c1>>8)&0xff, (c2>>8)&0xff, t);
    const b = rgbLerp(c1&0xff, c2&0xff, t);
    return '#' + ((1<<24) | (r<<16) | (g<<8) | b).toString(16).slice(1);
  }

  // ===== Input =====
  function getLocalCoords(clientX, clientY) {
    const rect = cv.getBoundingClientRect();
    return { x: (clientX - rect.left - CX) / SCALE, y: (CY - (clientY - rect.top)) / SCALE };
  }
  function insideDrum(x, y) { return x * x + y * y <= CFG.R_DRUM * CFG.R_DRUM; }
  function onDown(id, clientX, clientY) {
    const c = getLocalCoords(clientX, clientY);
    if (!insideDrum(c.x, c.y)) return;
    state.pointers.set(id, { x: c.x, y: c.y, lastT: performance.now() / 1000 });
    state.holding = true;
  }
  function onMove(id, clientX, clientY) {
    const p = state.pointers.get(id);
    if (!p) return;
    const c = getLocalCoords(clientX, clientY);
    const now = performance.now() / 1000;
    const dx = c.x - p.x, dy = c.y - p.y;
    const mx = (p.x + c.x) * 0.5, my = (p.y + c.y) * 0.5;
    const r = Math.hypot(mx, my);
    if (r > 5) {
      const tx = -my / r, ty = mx / r;
      const tang = dx * tx + dy * ty;
      const SWIPE_GAIN = 0.004;
      state.omegaTarget += tang * SWIPE_GAIN / Math.max(0.3, r / CFG.R_DRUM);
      const OMAX = 2 * Math.PI * 1.5;
      if (state.omegaTarget > OMAX) state.omegaTarget = OMAX;
      if (state.omegaTarget < -OMAX) state.omegaTarget = -OMAX;
    }
    p.x = c.x; p.y = c.y; p.lastT = now;
  }
  function onUp(id) { state.pointers.delete(id); if (state.pointers.size === 0) state.holding = false; }
  cv.addEventListener('pointerdown', e => { cv.setPointerCapture(e.pointerId); onDown(e.pointerId, e.clientX, e.clientY); });
  cv.addEventListener('pointermove', e => { if (state.pointers.has(e.pointerId)) onMove(e.pointerId, e.clientX, e.clientY); });
  cv.addEventListener('pointerup', e => onUp(e.pointerId));
  cv.addEventListener('pointercancel', e => onUp(e.pointerId));
  cv.addEventListener('pointerleave', e => onUp(e.pointerId));
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  // ===== Ω arrow buttons =====
  const OMEGA_STEP = 2 * Math.PI / 100;
  const OMAX = 2 * Math.PI * 1.5;
  function bumpOmega(sign) {
    state.omegaTarget += sign * OMEGA_STEP;
    if (state.omegaTarget >  OMAX) state.omegaTarget =  OMAX;
    if (state.omegaTarget < -OMAX) state.omegaTarget = -OMAX;
  }
  function wirePressHold(btn, fn) {
    let timer = null, iv = null;
    const start = (e) => { e.preventDefault(); fn(); timer = setTimeout(() => { iv = setInterval(fn, 90); }, 350); };
    const stop = () => { if (timer) { clearTimeout(timer); timer = null; } if (iv) { clearInterval(iv); iv = null; } };
    btn.addEventListener('pointerdown', start);
    btn.addEventListener('pointerup', stop);
    btn.addEventListener('pointerleave', stop);
    btn.addEventListener('pointercancel', stop);
  }
  function curvedArrowPath(cx, cy, R, a0, a1, thickness, direction) {
    const toPt = (ang, r) => [cx + r * Math.cos(ang), cy - r * Math.sin(ang)];
    const rOut = R + thickness, rIn = R - thickness;
    const headSpan = Math.min(0.35, Math.abs(a1 - a0) * 0.35);
    const aHeadTip = (direction > 0) ? a1 : a0;
    const aHeadBase = (direction > 0) ? (a1 - Math.sign(a1 - a0) * headSpan) : (a0 + Math.sign(a1 - a0) * headSpan);
    const aBody0 = (direction > 0) ? a0 : a1;
    const aBody1 = aHeadBase;
    const sweepOuter = (aBody1 > aBody0) ? 0 : 1;
    const sweepInner = 1 - sweepOuter;
    const [pOut0x, pOut0y] = toPt(aBody0, rOut);
    const [pOut1x, pOut1y] = toPt(aBody1, rOut);
    const [pIn1x, pIn1y] = toPt(aBody1, rIn);
    const [pIn0x, pIn0y] = toPt(aBody0, rIn);
    const headT = thickness * 1.9;
    const [tipX, tipY] = toPt(aHeadTip, R);
    const [baseOutX, baseOutY] = toPt(aHeadBase, R + headT);
    const [baseInX, baseInY] = toPt(aHeadBase, R - headT);
    let d = `M ${pOut0x.toFixed(2)} ${pOut0y.toFixed(2)} `;
    d += `A ${rOut} ${rOut} 0 0 ${sweepOuter} ${pOut1x.toFixed(2)} ${pOut1y.toFixed(2)} `;
    d += `L ${baseOutX.toFixed(2)} ${baseOutY.toFixed(2)} `;
    d += `L ${tipX.toFixed(2)} ${tipY.toFixed(2)} `;
    d += `L ${baseInX.toFixed(2)} ${baseInY.toFixed(2)} `;
    d += `L ${pIn1x.toFixed(2)} ${pIn1y.toFixed(2)} `;
    d += `A ${rIn} ${rIn} 0 0 ${sweepInner} ${pIn0x.toFixed(2)} ${pIn0y.toFixed(2)} `;
    d += `Z`;
    return d;
  }
  function buildOmegaControls() {
    const svg = document.getElementById('omegaCtl');
    if (!svg) return;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.style.width = W + 'px';
    svg.style.height = H + 'px';
    const drumPx = pxDist(CFG.R_DRUM);
    const R = drumPx + 60;
    const thickness = 22;
    const gap = 12 * Math.PI / 180;
    const span = 45 * Math.PI / 180;
    const aPlusStart = Math.PI + gap;
    const aPlusEnd   = Math.PI + gap + span;
    const aMinusStart = Math.PI - gap - span;
    const aMinusEnd   = Math.PI - gap;
    const plusD  = curvedArrowPath(CX, CY, R, aPlusStart, aPlusEnd, thickness, +1);
    const minusD = curvedArrowPath(CX, CY, R, aMinusEnd, aMinusStart, thickness, +1);
    const aPM = (aPlusStart + aPlusEnd) / 2;
    const aMM = (aMinusStart + aMinusEnd) / 2;
    const pL = { x: CX + R * Math.cos(aPM), y: CY - R * Math.sin(aPM) };
    const mL = { x: CX + R * Math.cos(aMM), y: CY - R * Math.sin(aMM) };
    svg.innerHTML = `
      <defs>
        <linearGradient id="gradRed" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff6a5a"/><stop offset="0.5" stop-color="#d22818"/><stop offset="1" stop-color="#6a0a0a"/></linearGradient>
        <linearGradient id="gradRedHover" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff8876"/><stop offset="0.5" stop-color="#e63a22"/><stop offset="1" stop-color="#801010"/></linearGradient>
        <linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7ef09a"/><stop offset="0.5" stop-color="#22a04a"/><stop offset="1" stop-color="#0a4018"/></linearGradient>
        <linearGradient id="gradGreenHover" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a0ffb8"/><stop offset="0.5" stop-color="#2cc058"/><stop offset="1" stop-color="#0e5020"/></linearGradient>
      </defs>
      <g class="btn" id="btnOmegaPlus">
        <path class="btn-arrow" d="${plusD}"/>
        <text class="btn-label" x="${pL.x.toFixed(1)}" y="${pL.y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle">+Ω</text>
      </g>
      <g class="btn" id="btnOmegaMinus">
        <path class="btn-arrow" d="${minusD}"/>
        <text class="btn-label" x="${mL.x.toFixed(1)}" y="${mL.y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle">−Ω</text>
      </g>
    `;
    wirePressHold(document.getElementById('btnOmegaPlus'),  () => bumpOmega(+1));
    wirePressHold(document.getElementById('btnOmegaMinus'), () => bumpOmega(-1));
  }

  // ===== Audio =====
  const AUDIO = { ctx: null, master: null, motor: {}, enabled: true };
  function initAudio() {
    if (AUDIO.ctx) return;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      AUDIO.ctx = new Ctx();
      AUDIO.master = AUDIO.ctx.createGain();
      AUDIO.master.gain.value = AUDIO.enabled ? 0.6 : 0.0;
      AUDIO.master.connect(AUDIO.ctx.destination);
      const a = AUDIO.ctx.createOscillator(); a.type = 'sawtooth'; a.frequency.value = 60;
      const b = AUDIO.ctx.createOscillator(); b.type = 'sawtooth'; b.frequency.value = 60 * 1.01;
      const sum = AUDIO.ctx.createGain(); sum.gain.value = 0;
      const lp = AUDIO.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 400; lp.Q.value = 0.7;
      a.connect(sum); b.connect(sum); sum.connect(lp); lp.connect(AUDIO.master);
      const bufSize = 2 * AUDIO.ctx.sampleRate;
      const noiseBuf = AUDIO.ctx.createBuffer(1, bufSize, AUDIO.ctx.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = AUDIO.ctx.createBufferSource(); noise.buffer = noiseBuf; noise.loop = true;
      const noiseBP = AUDIO.ctx.createBiquadFilter(); noiseBP.type = 'bandpass'; noiseBP.frequency.value = 300; noiseBP.Q.value = 0.8;
      const noiseGain = AUDIO.ctx.createGain(); noiseGain.gain.value = 0;
      noise.connect(noiseBP); noiseBP.connect(noiseGain); noiseGain.connect(AUDIO.master);
      a.start(); b.start(); noise.start();
      AUDIO.motor = { oscA: a, oscB: b, noise, noiseFilter: noiseBP, gainOsc: sum, gainNoise: noiseGain, started: true };
    } catch (e) { AUDIO.ctx = null; }
  }
  function updateMotorSound() {
    if (!AUDIO.ctx || !AUDIO.motor.started) return;
    const absOm = Math.abs(state.omega);
    const pitchBase = 40 + Math.min(1, absOm / (2 * Math.PI * 1.5)) * 200;
    const targetOscGain = Math.min(0.35, absOm * 0.20);
    const targetNoiseGain = Math.min(0.12, absOm * 0.07);
    const t = AUDIO.ctx.currentTime;
    const TAU = 0.06;
    AUDIO.motor.oscA.frequency.setTargetAtTime(pitchBase, t, TAU);
    AUDIO.motor.oscB.frequency.setTargetAtTime(pitchBase * 1.01, t, TAU);
    AUDIO.motor.noiseFilter.frequency.setTargetAtTime(200 + pitchBase * 0.6, t, TAU);
    AUDIO.motor.gainOsc.gain.setTargetAtTime(targetOscGain, t, TAU);
    AUDIO.motor.gainNoise.gain.setTargetAtTime(targetNoiseGain, t, TAU);
  }
  function soundTink() {
    if (!AUDIO.ctx) return;
    const t = AUDIO.ctx.currentTime;
    const lp = AUDIO.ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(900, t);
    lp.frequency.exponentialRampToValueAtTime(160, t + 0.18);
    lp.Q.value = 4;
    const g = AUDIO.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.35, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.26);
    const o1 = AUDIO.ctx.createOscillator();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(220, t);
    o1.frequency.exponentialRampToValueAtTime(90, t + 0.16);
    const bufSize = Math.floor(AUDIO.ctx.sampleRate * 0.05);
    const noiseBuf = AUDIO.ctx.createBuffer(1, bufSize, AUDIO.ctx.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
    const n = AUDIO.ctx.createBufferSource(); n.buffer = noiseBuf;
    const nbp = AUDIO.ctx.createBiquadFilter(); nbp.type = 'bandpass'; nbp.frequency.value = 300; nbp.Q.value = 2;
    const ng = AUDIO.ctx.createGain();
    ng.gain.setValueAtTime(0.25, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    o1.connect(g); g.connect(lp); lp.connect(AUDIO.master);
    n.connect(nbp); nbp.connect(ng); ng.connect(AUDIO.master);
    o1.start(t); o1.stop(t + 0.3);
    n.start(t); n.stop(t + 0.05);
  }
  function soundChime() {
    if (!AUDIO.ctx) return;
    const t = AUDIO.ctx.currentTime;
    [880, 1320].forEach((f, i) => {
      const o = AUDIO.ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = AUDIO.ctx.createGain();
      const start = t + i * 0.06;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.14, start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.6);
      o.connect(g); g.connect(AUDIO.master);
      o.start(start); o.stop(start + 0.65);
    });
  }
  function ensureAudio() {
    if (!AUDIO.ctx) initAudio();
    if (AUDIO.ctx && AUDIO.ctx.state === 'suspended') AUDIO.ctx.resume();
  }
  window.addEventListener('pointerdown', ensureAudio);
  window.addEventListener('keydown', ensureAudio);

  // ===== HUD =====
  const elPeriod = document.getElementById('period');
  const elFloating = document.getElementById('floating');
  const elCaptured = document.getElementById('captured');
  const elRemaining = document.getElementById('remaining');
  const elVT = document.getElementById('vt');

  function updateHUD() {
    const absOm = Math.abs(state.omega);
    const T = absOm < 1e-3 ? Infinity : (2 * Math.PI / absOm);
    elPeriod.textContent = isFinite(T) ? T.toFixed(2) : '∞';
    let floating = 0, captured = 0, levitated = 0;
    for (const p of state.particles) {
      if (!p.alive) continue;
      if (p.stuck) { captured++; p.wasLevitated = false; continue; }
      floating++;
      const nowLev = isFinite(T) && p.inHighlightSince !== null && (state.t - p.inHighlightSince) >= T;
      if (nowLev) {
        levitated++;
        if (!p.wasLevitated) { soundChime(); p.wasLevitated = true; }
      } else if (p.wasLevitated) {
        p.wasLevitated = false;
      }
    }
    elFloating.textContent = floating;
    elCaptured.textContent = captured;
    elRemaining.textContent = levitated;
  }

  // ===== Dropdowns =====
  const SETTINGS = {
    NP:     { values: [1, 2, 3, 10, 30, 100], idx: 2, apply: (v) => { CFG.N_P = v; }, label: (v) => String(v) },
    VT:     { values: [10, 30, 50], idx: 1, apply: (v) => { CFG.V_T = v; elVT.textContent = v.toFixed(1); }, label: (v) => String(v) },
    SPREAD: { values: [0, 0.01, 0.02, 0.05, 0.10, 0.20], idx: 0, apply: (v) => { CFG.VT_SPREAD = v; }, label: (v) => Math.round(v * 100) + '%' },
    DT:     { values: [0, 0.5, 1, 2], idx: 2, apply: (v) => { CFG.DT_INJECT = v; }, label: (v) => (v + ' s') },
  };
  const SEL_WIN = {
    NP: document.getElementById('winNP'),
    VT: document.getElementById('winVT'),
    SPREAD: document.getElementById('winSpread'),
    DT: document.getElementById('winDT'),
  };
  function cycleSetting(key, dir) {
    const s = SETTINGS[key];
    s.idx = (s.idx + dir + s.values.length) % s.values.length;
    const v = s.values[s.idx];
    s.apply(v);
    SEL_WIN[key].textContent = s.label(v);
  }
  function applyInitialSettings() {
    for (const key of Object.keys(SETTINGS)) {
      const s = SETTINGS[key];
      const v = s.values[s.idx];
      s.apply(v);
      SEL_WIN[key].textContent = s.label(v);
    }
  }
  document.querySelectorAll('.sel').forEach(sel => {
    const key = sel.getAttribute('data-key');
    sel.querySelectorAll('.chev').forEach(ch => {
      const dir = parseInt(ch.getAttribute('data-dir'), 10);
      ch.addEventListener('click', (e) => { e.preventDefault(); cycleSetting(key, dir); });
    });
    const win = sel.querySelector('.win');
    if (win) win.addEventListener('click', (e) => { e.preventDefault(); cycleSetting(key, +1); });
  });
  applyInitialSettings();

  // ===== Buttons =====
  const btnStart = document.getElementById('btnStart');
  const btnReset = document.getElementById('btnReset');
  const btnLaser = document.getElementById('btnLaser');
  const btnOmegaCtl = document.getElementById('btnOmegaCtl');
  const btnSound = document.getElementById('btnSound');
  btnStart.addEventListener('click', () => { startRelease(); btnStart.classList.add('on'); });
  btnReset.addEventListener('click', () => {
    initLevel();
    btnStart.classList.remove('on');
    btnReset.classList.add('flash');
    setTimeout(() => btnReset.classList.remove('flash'), 200);
  });
  btnLaser.addEventListener('click', () => {
    state.laserOn = !state.laserOn;
    btnLaser.classList.toggle('on', state.laserOn);
  });
  const omegaCtlEl = document.getElementById('omegaCtl');
  omegaCtlEl.classList.add('disabled');
  let omegaCtlOn = false;
  btnOmegaCtl.addEventListener('click', () => {
    omegaCtlOn = !omegaCtlOn;
    btnOmegaCtl.classList.toggle('on', omegaCtlOn);
    omegaCtlEl.classList.toggle('disabled', !omegaCtlOn);
  });
  btnSound.classList.add('on');
  btnSound.addEventListener('click', () => {
    AUDIO.enabled = !AUDIO.enabled;
    btnSound.classList.toggle('on', AUDIO.enabled);
    if (AUDIO.master) {
      const t = AUDIO.ctx.currentTime;
      AUDIO.master.gain.setTargetAtTime(AUDIO.enabled ? 0.6 : 0.0, t, 0.05);
    }
  });

  // ===== Main =====
  window.addEventListener('resize', layout);
  layout();
  initLevel();

  let lastT = performance.now() / 1000;
  function loop() {
    const now = performance.now() / 1000;
    let dt = now - lastT;
    lastT = now;
    if (dt > CFG.MAX_DT) dt = CFG.MAX_DT;
    const sub = Math.max(1, Math.ceil(dt / 0.01));
    const h = dt / sub;
    for (let i = 0; i < sub; i++) updateDrum(h);
    if (state.running) { for (let i = 0; i < sub; i++) step(h); }
    updateMotorSound();
    draw();
    updateHUD();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
