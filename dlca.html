<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D DLCA - Fractal Dimension & Stats</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0d0d0d; font-family: 'Segoe UI', sans-serif; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; background: rgba(0, 0, 0, 0.7); padding: 15px 25px; border-radius: 8px; border: 1px solid #333; min-width: 260px; z-index: 10; }
        h1 { margin: 0; font-size: 1.2rem; color: #4CAF50; }
        p { margin: 5px 0; font-size: 0.9rem; color: #ccc; }
        .highlight { color: #fff; font-weight: bold; }
        button { pointer-events: auto; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; }
        button.reset { background: #f44336; }
        .control-group { margin-top: 15px; pointer-events: auto; border-top: 1px solid #444; padding-top: 10px; }
        input[type="range"], select { width: 100%; cursor: pointer; background: #222; color: #fff; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.85rem; color: #bbb; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="ui">
    <h1>DLCA Simulation</h1>
    <p>Active Clusters: <span id="clusterCount" class="highlight">0</span></p>
    <p>Largest Cluster: <span id="maxClusterSize" class="highlight">0</span></p>
    <p>Fractal Dim (D<sub>f</sub>): <span id="fractalDim" class="highlight">N/A</span></p>
    <p>Filling Factor (R<sub>g</sub>): <span id="fillingFactor" class="highlight">N/A</span></p>
    <p>Status: <span id="status" class="highlight" style="color:#aaa">Awaiting Start...</span></p>
    
    <button id="actionBtn">Generate & Start</button>

    <div class="control-group">
        <div class="slider-label"><span>Initial Particles</span><span id="densityDisp">3000</span></div>
        <input type="range" id="densitySlider" min="500" max="5000" step="500" value="3000">
    </div>

    <div class="control-group">
        <div class="slider-label"><span>Steps/Frame</span><span id="speedDisp">10</span></div>
        <input type="range" id="speedSlider" min="1" max="50" step="1" value="10">
    </div>

    <div class="control-group">
        <div class="slider-label"><span>Kinetic Mobility</span></div>
        <select id="mobilitySelect">
            <option value="realistic">Realistic (Heavy = Slow)</option>
            <option value="uniform" selected>Uniform (Equal Speed)</option>
        </select>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let initialParticles = 3000, stepsPerFrame = 10, isRunning = false;
    let mobilityMode = "uniform";
    let nextFlyAroundTarget = 0;

    const actionBtn = document.getElementById('actionBtn');
    const statusText = document.getElementById('status');

    document.getElementById('densitySlider').addEventListener('input', (e) => {
        initialParticles = parseInt(e.target.value);
        document.getElementById('densityDisp').innerText = initialParticles.toLocaleString();
    });

    document.getElementById('speedSlider').addEventListener('input', (e) => {
        stepsPerFrame = parseInt(e.target.value);
        document.getElementById('speedDisp').innerText = stepsPerFrame;
    });

    document.getElementById('mobilitySelect').addEventListener('change', (e) => {
        mobilityMode = e.target.value;
    });

    actionBtn.addEventListener('click', () => {
        if (!isRunning) {
            isRunning = true;
            actionBtn.innerText = "Reset Simulation";
            actionBtn.classList.add('reset');
            statusText.innerText = "Simulating...";
            initDLCA();
        } else {
            isRunning = false;
            actionBtn.innerText = "Generate & Start";
            actionBtn.classList.remove('reset');
            clearDLCA();
        }
    });

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0d0d0d, 0.005);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(0, 0, 150);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dLight.position.set(10, 20, 10);
    scene.add(dLight);

    const R = 1.0, D_SQ = 4 * R * R, CELL_SIZE = 2 * R, CONTAINER_RADIUS = 60;
    let activeClusters = new Set(), particles = [];
    let instancedMesh = null;
    const dummy = new THREE.Object3D();

    let isFlyingAround = false, flyProgress = 0, flyRadius = 0, flyPolar = 0, flyAngleStart = 0;

    class Particle {
        constructor(id, cluster) {
            this.id = id;
            this.cluster = cluster;
            this.localPos = new THREE.Vector3();
            this.worldPos = new THREE.Vector3();
        }
    }

    class Cluster {
        constructor() {
            this.pos = new THREE.Vector3();
            this.particles = [];
            this.color = new THREE.Color().setHSL(Math.random(), 0.7, 0.5);
        }
    }

    function clearDLCA() {
        if (instancedMesh) { scene.remove(instancedMesh); instancedMesh.dispose(); instancedMesh = null; }
        activeClusters.clear();
        particles = [];
        statusText.innerText = "Awaiting Start...";
        document.getElementById('fillingFactor').innerText = "N/A";
        document.getElementById('fractalDim').innerText = "N/A";
    }

    function initDLCA() {
        clearDLCA();
        nextFlyAroundTarget = Math.floor(initialParticles / 2);
        instancedMesh = new THREE.InstancedMesh(new THREE.SphereGeometry(R, 8, 8), new THREE.MeshLambertMaterial({color: 0xffffff}), initialParticles);
        
        for (let i = 0; i < initialParticles; i++) {
            const cluster = new Cluster();
            const r = CONTAINER_RADIUS * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI, phi = Math.acos(2 * Math.random() - 1);
            cluster.pos.set(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
            const p = new Particle(i, cluster);
            cluster.particles.push(p);
            activeClusters.add(cluster);
            particles.push(p);
            updateVis(p);
        }
        scene.add(instancedMesh);
    }

    function updateVis(p) {
        p.worldPos.copy(p.cluster.pos).add(p.localPos);
        dummy.position.copy(p.worldPos);
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(p.id, dummy.matrix);
        instancedMesh.setColorAt(p.id, p.cluster.color);
    }

    function mergeClusters(c1, c2, p1, p2) {
        const dir = new THREE.Vector3().subVectors(p1.worldPos, p2.worldPos).normalize();
        const contactPos = new THREE.Vector3().copy(p2.worldPos).addScaledVector(dir, 2 * R);
        const shift = new THREE.Vector3().subVectors(contactPos, p1.worldPos);
        
        c1.pos.add(shift); 

        let large = c1.particles.length >= c2.particles.length ? c1 : c2;
        let small = c1 === large ? c2 : c1;

        small.particles.forEach(p => {
            p.worldPos.copy(small.pos).add(p.localPos);
            p.localPos.copy(p.worldPos).sub(large.pos);
            p.cluster = large;
            large.particles.push(p);
            updateVis(p);
        });
        activeClusters.delete(small);

        if (activeClusters.size <= nextFlyAroundTarget && activeClusters.size > 1) {
            nextFlyAroundTarget = Math.floor(activeClusters.size / 2);
            triggerFlyAround();
        }
    }

    function triggerFlyAround() {
        isFlyingAround = true;
        controls.enabled = false;
        flyProgress = 0;
        const s = new THREE.Spherical().setFromVector3(camera.position);
        flyRadius = s.radius; flyPolar = s.phi; flyAngleStart = s.theta;
        statusText.innerText = "Milestone! Halved Active Clusters...";
    }

    function updateStats() {
        document.getElementById('clusterCount').innerText = activeClusters.size;
        
        let maxS = 0;
        let largestCluster = null;
        activeClusters.forEach(c => {
            if (c.particles.length > maxS) {
                maxS = c.particles.length;
                largestCluster = c;
            }
        });
        document.getElementById('maxClusterSize').innerText = maxS;

        if (largestCluster && maxS > 1) {
            let sumSq = 0;
            largestCluster.particles.forEach(p => {
                sumSq += p.localPos.lengthSq();
            });
            const Rg = Math.sqrt(sumSq / maxS);
            
            // Fractal Dimension (Df) based on Rg
            const df = (Math.log(maxS) / Math.log(Rg / R)).toFixed(3);
            document.getElementById('fractalDim').innerText = df;

            const volumeParticles = maxS * Math.pow(R, 3);
            const volumeRg = Math.pow(Rg, 3);
            const ff = (volumeParticles / volumeRg * 100).toFixed(4) + "%";
            document.getElementById('fillingFactor').innerText = ff;
        }
    }

    function processDLCA() {
        if (!isRunning || isFlyingAround || activeClusters.size <= 1) return;

        for (let step = 0; step < stepsPerFrame; step++) {
            const grid = new Map();
            particles.forEach(p => {
                p.worldPos.copy(p.cluster.pos).add(p.localPos);
                const key = `${Math.floor(p.worldPos.x/CELL_SIZE)},${Math.floor(p.worldPos.y/CELL_SIZE)},${Math.floor(p.worldPos.z/CELL_SIZE)}`;
                if (!grid.has(key)) grid.set(key, []);
                grid.get(key).push(p);
            });

            const clusters = Array.from(activeClusters);
            for (let c of clusters) {
                if (!activeClusters.has(c)) continue;
                
                let stepSize = 0.4;
                if (mobilityMode === "realistic") {
                    stepSize = 0.5 / Math.sqrt(c.particles.length);
                }

                const move = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize().multiplyScalar(stepSize);
                c.pos.add(move);

                if (c.pos.lengthSq() > CONTAINER_RADIUS * CONTAINER_RADIUS) {
                    c.pos.sub(move);
                }

                let collided = false;
                for (let p of c.particles) {
                    p.worldPos.copy(c.pos).add(p.localPos);
                    const cx = Math.floor(p.worldPos.x/CELL_SIZE), cy = Math.floor(p.worldPos.y/CELL_SIZE), cz = Math.floor(p.worldPos.z/CELL_SIZE);
                    
                    for (let x=-1; x<=1 && !collided; x++) {
                        for (let y=-1; y<=1 && !collided; y++) {
                            for (let z=-1; z<=1 && !collided; z++) {
                                const cell = grid.get(`${cx+x},${cy+y},${cz+z}`);
                                if (cell) {
                                    for (let otherP of cell) {
                                        if (otherP.cluster !== c && p.worldPos.distanceToSquared(otherP.worldPos) <= D_SQ) {
                                            mergeClusters(c, otherP.cluster, p, otherP);
                                            collided = true; break;
                                        }
                                    }
                                }
                            }
                        }
                    }
                    if (collided) break;
                }
            }
        }
        particles.forEach(updateVis);
        instancedMesh.instanceMatrix.needsUpdate = true;
        if(instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;
        updateStats();
    }

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const d = clock.getDelta();

        const camDist = camera.position.length();
        scene.fog.density = 0.6 / (camDist + 20);

        if (isFlyingAround) {
            flyProgress += d * 0.5;
            if (flyProgress >= 1) { isFlyingAround = false; controls.enabled = true; statusText.innerText = "Simulating..."; }
            const theta = flyAngleStart + (flyProgress * Math.PI * 2);
            camera.position.setFromSpherical(new THREE.Spherical(flyRadius, flyPolar, theta));
            camera.lookAt(0,0,0);
        } else {
            processDLCA();
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
