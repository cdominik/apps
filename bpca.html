<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPCA Simulation Live - Rg Filling Factor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d0d0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #333;
            min-width: 250px;
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            color: #4CAF50;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            color: #aaa;
            font-weight: normal;
        }
        p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #ccc;
        }
        .highlight {
            color: #fff;
            font-weight: bold;
        }
        #slider-container {
            display: none;
            margin-top: 15px;
            pointer-events: auto;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui">
    <h1>BPCA Simulation</h1>
    <h2>Particle-Cluster Aggregation</h2>
    <p>Phase: <span id="phaseCount" class="highlight">1</span></p>
    <p>Particles: <span id="particleCount" class="highlight">1</span> / 20,000</p>
    <p>Fractal Dim (D<sub>f</sub>): <span id="fractalDim" class="highlight">N/A</span></p>
    <p>Filling Factor (R<sub>g</sub>): <span id="fillingFactor" class="highlight">100.000%</span></p>
    <p>Status: <span id="status" class="highlight">Initializing...</span></p>
    
    <div id="slider-container">
        <p><strong>Continuous History Scrubbing</strong></p>
        <input type="range" id="historySlider" min="1" max="1" value="1">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0d0d0d, 0.002);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50000);
    camera.position.set(0, 0, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: false }); 
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x404040, 2.0);
    scene.add(ambientLight);
    
    const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight1.position.set(10, 20, 10);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xaaaaaa, 0.5);
    dirLight2.position.set(-10, -20, -10);
    scene.add(dirLight2);

    const R = 1.0;          
    const D_SQ = 4 * R * R; 
    const MAX_PARTICLES = 20000; 
    const CELL_SIZE = 2 * R; 
    
    let currentCluster = [];
    let spatialGrid = new Map();
    let rBoundSq = 0; 
    
    const geoHigh = new THREE.SphereGeometry(R, 16, 16); 
    const geoLow = new THREE.SphereGeometry(R, 8, 8);    
    const colorCluster = 0x4CAF50; 
    const colorMonomer = 0x2196F3; 
    const matCluster = new THREE.MeshLambertMaterial({ color: colorCluster });
    const matMonomer = new THREE.MeshLambertMaterial({ color: colorMonomer });
    
    let instancedMeshCluster = new THREE.InstancedMesh(geoHigh, matCluster, MAX_PARTICLES);
    instancedMeshCluster.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    instancedMeshCluster.count = 0;
    scene.add(instancedMeshCluster);

    let singleMonomerMesh = new THREE.Mesh(geoHigh, matMonomer);
    scene.add(singleMonomerMesh);
    singleMonomerMesh.visible = false;

    const dummy = new THREE.Object3D();

    let isAnimatingMonomer = false;
    let isFlyingAround = false;
    let simulationHalted = false;
    
    let animProgress = 0;
    let monomerStartPos = new THREE.Vector3();
    let monomerTargetPos = new THREE.Vector3();

    let flyProgress = 0;
    let flyRadius = 0;
    let flyPolar = 0;
    let flyAngleStart = 0;

    let phaseCount = 1;
    let targetPhaseMass = 2;
    let particlesAddedThisPhase = 0;
    let totalToAddThisPhase = 1;
    let animationStep = 1;
    let animatedCountThisPhase = 0;

    function addParticleToSystem(p) {
        const index = currentCluster.length;
        currentCluster.push(p);

        const cx = Math.floor(p.x / CELL_SIZE);
        const cy = Math.floor(p.y / CELL_SIZE);
        const cz = Math.floor(p.z / CELL_SIZE);
        const key = `${cx},${cy},${cz}`;
        if (!spatialGrid.has(key)) spatialGrid.set(key, []);
        spatialGrid.get(key).push(p);

        const sq = p.x*p.x + p.y*p.y + p.z*p.z;
        if (sq > rBoundSq) rBoundSq = sq;

        if (index === 10000) {
            scene.remove(instancedMeshCluster);
            instancedMeshCluster.dispose();
            
            instancedMeshCluster = new THREE.InstancedMesh(geoLow, matCluster, MAX_PARTICLES);
            instancedMeshCluster.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            
            for(let i = 0; i < currentCluster.length; i++) {
                dummy.position.copy(currentCluster[i]);
                dummy.updateMatrix();
                instancedMeshCluster.setMatrixAt(i, dummy.matrix);
            }
            scene.add(instancedMeshCluster);
            
            singleMonomerMesh.geometry = geoLow; 
        }

        dummy.position.copy(p);
        dummy.updateMatrix();
        instancedMeshCluster.setMatrixAt(index, dummy.matrix);
        instancedMeshCluster.count = currentCluster.length;
        instancedMeshCluster.instanceMatrix.needsUpdate = true;
    }

    function updateStatsForN(n) {
        if (n <= 1) {
            document.getElementById('particleCount').innerText = n;
            document.getElementById('fractalDim').innerText = "N/A";
            document.getElementById('fillingFactor').innerText = "100.000%";
            return;
        }

        let sumSq = 0;
        
        for (let i = 0; i < n; i++) {
            const p = currentCluster[i];
            sumSq += (p.x*p.x + p.y*p.y + p.z*p.z);
        }

        const Rg = Math.sqrt(sumSq / n);
        const df = (Rg <= 1.01) ? "N/A" : (Math.log(n) / Math.log(Rg / R)).toFixed(3);

        const volumeParticles = n * Math.pow(R, 3);
        const volumeRg = Math.pow(Rg, 3);
        const ff = (volumeParticles / volumeRg * 100).toFixed(3) + "%";

        document.getElementById('particleCount').innerText = n.toLocaleString();
        document.getElementById('fractalDim').innerText = df;
        document.getElementById('fillingFactor').innerText = ff;
    }

    function calculateBPCA_Addition() {
        const rBound = Math.sqrt(rBoundSq) + R;
        const maxImpact = rBound + R;

        let hitParticle = null;
        let minT = Infinity;
        let startPos = new THREE.Vector3();
        let dir = new THREE.Vector3();

        while (!hitParticle) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            const normal = new THREE.Vector3(
                Math.sin(phi) * Math.cos(theta),
                Math.sin(phi) * Math.sin(theta),
                Math.cos(phi)
            );

            const up = new THREE.Vector3(0, 1, 0);
            if (Math.abs(normal.y) > 0.99) up.set(1, 0, 0);
            const tangent1 = new THREE.Vector3().crossVectors(normal, up).normalize();
            const tangent2 = new THREE.Vector3().crossVectors(normal, tangent1).normalize();

            const radiusOffset = Math.sqrt(Math.random()) * maxImpact;
            const diskAngle = Math.random() * Math.PI * 2;
            const dx = radiusOffset * Math.cos(diskAngle);
            const dy = radiusOffset * Math.sin(diskAngle);

            const stagingDistance = rBound + 15;
            
            startPos.copy(normal).multiplyScalar(stagingDistance)
                .add(tangent1.multiplyScalar(dx))
                .add(tangent2.multiplyScalar(dy));

            dir.copy(normal).negate(); 

            let candidates = new Set();
            let maxDist = stagingDistance + rBound + 5; 
            
            for (let dist = 0; dist <= maxDist; dist += CELL_SIZE) {
                let px = startPos.x + dir.x * dist;
                let py = startPos.y + dir.y * dist;
                let pz = startPos.z + dir.z * dist;
                
                let cx = Math.floor(px / CELL_SIZE);
                let cy = Math.floor(py / CELL_SIZE);
                let cz = Math.floor(pz / CELL_SIZE);
                
                for(let nx=cx-1; nx<=cx+1; nx++) {
                    for(let ny=cy-1; ny<=cy+1; ny++) {
                        for(let nz=cz-1; nz<=cz+1; nz++) {
                            let key = `${nx},${ny},${nz}`;
                            let cell = spatialGrid.get(key);
                            if (cell) {
                                for(let i=0; i<cell.length; i++) candidates.add(cell[i]);
                            }
                        }
                    }
                }
            }

            for (let p of candidates) {
                let lx = p.x - startPos.x;
                let ly = p.y - startPos.y;
                let lz = p.z - startPos.z;
                
                let tca = lx*dir.x + ly*dir.y + lz*dir.z;
                if (tca < 0) continue; 
                
                let d2 = (lx*lx + ly*ly + lz*lz) - tca*tca;
                if (d2 > D_SQ) continue; 
                
                let thc = Math.sqrt(D_SQ - d2);
                let t = tca - thc;
                
                if (t > 0 && t < minT) {
                    minT = t;
                    hitParticle = p;
                }
            }
        }

        const targetPos = new THREE.Vector3().copy(startPos).add(dir.multiplyScalar(minT));
        return { startPos, targetPos };
    }

    function startPhase() {
        if (currentCluster.length >= MAX_PARTICLES) {
            document.getElementById('status').innerText = "20k Limit Reached. Simulation Complete.";
            enableHistoryPlayback();
            simulationHalted = true;
            return;
        }

        targetPhaseMass = Math.min(MAX_PARTICLES, currentCluster.length * 2);
        totalToAddThisPhase = targetPhaseMass - currentCluster.length;
        particlesAddedThisPhase = 0;
        animatedCountThisPhase = 0;

        let numToAnimate = Math.min(10, totalToAddThisPhase);
        animationStep = Math.max(1, Math.floor(totalToAddThisPhase / numToAnimate));

        document.getElementById('phaseCount').innerText = phaseCount;
        setTimeout(processAddition, 10);
    }

    function processAddition() {
        if (particlesAddedThisPhase >= totalToAddThisPhase) {
            updateStatsForN(currentCluster.length);
            phaseCount++;
            startFlyAround();
            return;
        }

        const shouldAnimate = (particlesAddedThisPhase % animationStep === 0) && (animatedCountThisPhase < 10);

        if (shouldAnimate) {
            document.getElementById('status').innerText = "Simulating visual approach...";
            
            const collision = calculateBPCA_Addition();
            monomerStartPos.copy(collision.startPos);
            monomerTargetPos.copy(collision.targetPos);
            
            singleMonomerMesh.position.copy(monomerStartPos);
            singleMonomerMesh.visible = true;
            
            const rBound = Math.sqrt(rBoundSq) + R;
            const requiredDist = rBound * 3 + 15;
            if (camera.position.length() < requiredDist) {
                camera.position.setLength(requiredDist);
            }

            animProgress = 0;
            isAnimatingMonomer = true;
            animatedCountThisPhase++;

        } else {
            document.getElementById('status').innerText = `Batch Computing Background Particles...`;
            
            let batchLimit = 2000; 
            let processedThisTick = 0;

            while (particlesAddedThisPhase < totalToAddThisPhase && processedThisTick < batchLimit) {
                const checkAnimate = (particlesAddedThisPhase % animationStep === 0) && (animatedCountThisPhase < 10);
                if (checkAnimate) break; 
                
                const collision = calculateBPCA_Addition();
                addParticleToSystem({ x: collision.targetPos.x, y: collision.targetPos.y, z: collision.targetPos.z });
                
                particlesAddedThisPhase++;
                processedThisTick++;
            }
            
            document.getElementById('particleCount').innerText = currentCluster.length.toLocaleString();
            
            requestAnimationFrame(processAddition); 
        }
    }

    function completeMonomerAnimation() {
        isAnimatingMonomer = false;
        singleMonomerMesh.visible = false;
        
        addParticleToSystem({ x: monomerTargetPos.x, y: monomerTargetPos.y, z: monomerTargetPos.z });
        particlesAddedThisPhase++;
        
        document.getElementById('particleCount').innerText = currentCluster.length.toLocaleString();
        processAddition();
    }

    function startFlyAround() {
        document.getElementById('status').innerText = "Mass Doubled! 360° Inspection...";
        updateStatsForN(currentCluster.length); 
        
        const spherical = new THREE.Spherical().setFromVector3(camera.position);
        const rBound = Math.sqrt(rBoundSq) + R;
        const targetRadius = rBound * 2.5;
        
        flyRadius = Math.max(spherical.radius, targetRadius);
        flyPolar = spherical.phi;
        flyAngleStart = spherical.theta;

        flyProgress = 0;
        isFlyingAround = true;
        controls.enabled = false; 
    }

    function enableHistoryPlayback() {
        const sliderContainer = document.getElementById('slider-container');
        const slider = document.getElementById('historySlider');
        
        sliderContainer.style.display = 'block';
        slider.max = currentCluster.length;
        slider.value = currentCluster.length;

        slider.addEventListener('input', (e) => {
            const n = parseInt(e.target.value, 10);
            
            instancedMeshCluster.count = n;
            document.getElementById('status').innerText = "History Playback";

            updateStatsForN(n);
        });
    }

    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (isAnimatingMonomer) {
            animProgress += delta * 3.0; 
            
            if (animProgress >= 1) {
                animProgress = 1;
                singleMonomerMesh.position.copy(monomerTargetPos);
                completeMonomerAnimation();
            } else {
                const t = animProgress;
                singleMonomerMesh.position.lerpVectors(monomerStartPos, monomerTargetPos, t);
            }
        } else if (isFlyingAround) {
            flyProgress += delta * 0.4; 

            if (flyProgress >= 1) {
                flyProgress = 1;
                isFlyingAround = false;
                controls.enabled = true; 
                setTimeout(startPhase, 200); 
            }

            const t = flyProgress * flyProgress * (3 - 2 * flyProgress);
            const currentTheta = flyAngleStart + (t * Math.PI * 2);

            const spherical = new THREE.Spherical(flyRadius, flyPolar, currentTheta);
            camera.position.setFromSpherical(spherical);
            camera.lookAt(0, 0, 0);
        }

        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    addParticleToSystem({ x: 0, y: 0, z: 0 });
    startPhase();
    animate();

</script>
</body>
</html>
